<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1720" />
  <title>点金术选股</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <style>
    :root {
      --bg: #f5f7fa;
      --paper: #ffffff;
      --ink: #182230;
      --muted: #667085;
      --line: #d9e0ea;
      --green: #14745f;
      --gold: #b4862f;
      --red: #b42318;
      --blue: #245a91;
      --shadow: 0 10px 24px rgba(18, 30, 48, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 15px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 5;
      padding: 14px 16px 12px;
      background: #0f1720;
      color: white;
      box-shadow: var(--shadow);
    }
    .topline { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    h1 { margin: 0; font-size: 21px; font-weight: 800; letter-spacing: 0; }
    .time { color: #c6d0dc; font-size: 12px; white-space: nowrap; }
    .url { margin-top: 5px; color: #9fb0c4; font-size: 12px; overflow-wrap: anywhere; }
    main { padding: 12px 12px 84px; max-width: 720px; margin: 0 auto; }
    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 6px;
      margin-bottom: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
    }
    .tab {
      min-height: 40px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-weight: 700;
    }
    .tab.active { background: #eaf2ef; color: var(--green); }
    .panel {
      display: none;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .panel.active { display: block; }
    .panel-head {
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    h2 { margin: 0; font-size: 17px; letter-spacing: 0; }
    .hint { margin: 2px 0 0; color: var(--muted); font-size: 12px; }
    button {
      border: 0;
      border-radius: 7px;
      min-height: 40px;
      padding: 0 13px;
      color: white;
      background: var(--green);
      font: inherit;
      font-weight: 800;
      white-space: nowrap;
    }
    button.secondary { background: #eef2f6; color: var(--ink); border: 1px solid var(--line); }
    button.gold { background: var(--gold); color: #111820; }
    button:disabled { opacity: .6; }
    .content { padding: 12px; }
    .metrics { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .metric {
      min-height: 72px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
    }
    .metric b { display: block; font-size: 20px; line-height: 1.2; overflow-wrap: anywhere; }
    .metric span { display: block; color: var(--muted); font-size: 12px; margin-top: 5px; }
    .stack { display: grid; gap: 10px; }
    .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
    }
    .card-title { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; }
    .code { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .price { font-size: 22px; font-weight: 850; }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #e9f6f1;
      color: var(--green);
      font-size: 12px;
      font-weight: 800;
    }
    .badge.wait { background: #fff5e6; color: #986100; }
    .kv { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
    .kv div { min-width: 0; }
    .kv span { display: block; color: var(--muted); font-size: 11px; }
    .kv b { display: block; margin-top: 2px; font-size: 14px; overflow-wrap: anywhere; }
    .toolbar { display: grid; grid-template-columns: 1fr auto; gap: 8px; margin-bottom: 10px; }
    select, input {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: white;
      color: var(--ink);
      padding: 0 10px;
      font: inherit;
    }
    .checkline { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 13px; margin: 8px 0 0; }
    .checkline input { width: 17px; height: 17px; }
    .empty, .error {
      padding: 18px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: #fbfcfe;
    }
    .error { color: var(--red); border-color: #f1b8b4; background: #fff1f0; text-align: left; }
    .loading {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 14px;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      border-radius: 8px;
      background: #0f1720;
      color: #fff;
      box-shadow: var(--shadow);
      font-weight: 800;
    }
    .loading.show { display: flex; }
    @media (min-width: 680px) {
      .stack { grid-template-columns: repeat(2, 1fr); }
      .metrics { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>
  <header>
    <div class="topline">
      <h1>点金术选股</h1>
      <div id="headerTime" class="time">--</div>
    </div>
    <div id="serverUrl" class="url">正在检测手机访问地址...</div>
  </header>

  <main>
    <nav class="tabs" aria-label="页面切换">
      <button class="tab active" data-tab="home">总览</button>
      <button class="tab" data-tab="etf">ETF</button>
      <button class="tab" data-tab="stock">A股</button>
    </nav>

    <section id="home" class="panel active">
      <div class="panel-head">
        <div>
          <h2>今日状态</h2>
          <p class="hint">打开即刷新 ETF，A股按需扫描。</p>
        </div>
        <button id="refreshAll" class="gold">刷新</button>
      </div>
      <div class="content">
        <div class="metrics">
          <div class="metric"><b id="etfHit">--</b><span>ETF买点</span></div>
          <div class="metric"><b id="stockCount">--</b><span>A股候选</span></div>
          <div class="metric"><b id="checkedCount">--</b><span>已检查</span></div>
          <div class="metric"><b id="dataTime">--</b><span>数据时间</span></div>
        </div>
      </div>
    </section>

    <section id="etf" class="panel">
      <div class="panel-head">
        <div>
          <h2>ETF观察</h2>
          <p class="hint">重点关注 562500 / 512760 / 563230 / 159326。</p>
        </div>
        <button id="refreshEtf">刷新</button>
      </div>
      <div class="content"><div id="etfList" class="stack"><div class="empty">等待刷新</div></div></div>
    </section>

    <section id="stock" class="panel">
      <div class="panel-head">
        <div>
          <h2>A股候选</h2>
          <p class="hint">先用 50 只快速扫描，确认可用后再扩大范围。</p>
        </div>
        <button id="scanBtn">扫描</button>
      </div>
      <div class="content">
        <div class="toolbar">
          <select id="limit">
            <option value="50">快速 50 只</option>
            <option value="300">常规 300 只</option>
            <option value="1000">扩大 1000 只</option>
            <option value="">全市场</option>
          </select>
          <button id="exportBtn" class="secondary">CSV</button>
        </div>
        <label class="checkline"><input id="force" type="checkbox" /> 强制刷新，不读今天缓存</label>
        <div id="stockList" class="stack" style="margin-top:10px;"><div class="empty">点击扫描获取候选股</div></div>
      </div>
    </section>
  </main>

  <div id="loading" class="loading">正在读取数据...</div>

  <script>
    const $ = id => document.getElementById(id);
    const state = { etfs: [], stocks: [] };

    function fmt(value, digits = 2) {
      if (value === null || value === undefined || Number.isNaN(Number(value))) return "-";
      return Number(value).toFixed(digits).replace(/0+$/, "").replace(/\.$/, "");
    }
    function pct(value) {
      if (value === null || value === undefined || Number.isNaN(Number(value))) return "-";
      return Number(value).toFixed(2) + "%";
    }
    function busy(text, on) {
      $("loading").textContent = text || "正在读取数据...";
      $("loading").classList.toggle("show", !!on);
    }
    function showTab(name) {
      document.querySelectorAll(".tab").forEach(btn => btn.classList.toggle("active", btn.dataset.tab === name));
      document.querySelectorAll(".panel").forEach(panel => panel.classList.toggle("active", panel.id === name));
    }

    async function loadHealth() {
      const res = await fetch("/api/health");
      const data = await res.json();
      $("headerTime").textContent = data.time || "--";
      const phoneUrl = (data.urls || []).find(u => !u.includes("127.0.0.1")) || location.href;
      $("serverUrl").textContent = "手机同 Wi-Fi 打开：" + phoneUrl;
    }

    async function refreshEtf(force = false) {
      busy("正在刷新 ETF...", true);
      try {
        const res = await fetch(`/api/etf?force=${force ? 1 : 0}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "ETF刷新失败");
        state.etfs = data.rows || [];
        $("dataTime").textContent = data.updated_at || "--";
        $("etfHit").textContent = state.etfs.filter(x => x.reached).length;
        renderEtfs();
      } catch (err) {
        $("etfList").innerHTML = `<div class="error">${err.message}</div>`;
      } finally {
        busy("", false);
      }
    }

    function renderEtfs() {
      if (!state.etfs.length) {
        $("etfList").innerHTML = `<div class="empty">暂无 ETF 数据</div>`;
        return;
      }
      $("etfList").innerHTML = state.etfs.map(row => `
        <article class="card">
          <div class="card-title">
            <div><strong>${row.name}</strong><div class="code">${row.code}</div></div>
            <div class="price">${fmt(row.price, 3)}</div>
          </div>
          <div style="margin-top:8px;"><span class="badge ${row.reached ? "" : "wait"}">${row.status}</span></div>
          <div class="kv">
            <div><span>MA120</span><b>${fmt(row.ma120, 3)}</b></div>
            <div><span>偏离</span><b>${pct(row.deviation)}</b></div>
            <div><span>买点</span><b>${fmt(row.buy_point, 3)}</b></div>
            <div><span>补仓</span><b>${fmt(row.add_price_1, 3)}</b></div>
            <div><span>深补</span><b>${fmt(row.add_price_2, 3)}</b></div>
            <div><span>止盈</span><b>${fmt(row.take_profit_1, 3)}</b></div>
          </div>
        </article>
      `).join("");
    }

    async function scanStocks() {
      busy("正在扫描 A股，首次会慢一些...", true);
      $("scanBtn").disabled = true;
      try {
        const params = new URLSearchParams({ limit: $("limit").value, force: $("force").checked ? "1" : "0" });
        const res = await fetch(`/api/scan?${params}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "扫描失败");
        state.stocks = data.rows || [];
        $("stockCount").textContent = data.count ?? state.stocks.length;
        $("checkedCount").textContent = data.checked ?? "--";
        $("dataTime").textContent = data.updated_at || "--";
        renderStocks(data.note || "");
      } catch (err) {
        $("stockList").innerHTML = `<div class="error">${err.message}</div>`;
      } finally {
        $("scanBtn").disabled = false;
        busy("", false);
      }
    }

    function renderStocks(note = "") {
      if (!state.stocks.length) {
        $("stockList").innerHTML = `<div class="empty">${note || "当前没有符合点金术条件的候选股"}</div>`;
        return;
      }
      $("stockList").innerHTML = state.stocks.slice(0, 40).map(row => `
        <article class="card">
          <div class="card-title">
            <div><strong>${row.name}</strong><div class="code">${row.code} · ${row.industry || "-"}</div></div>
            <div class="price">${fmt(row.price)}</div>
          </div>
          <div style="margin-top:8px;"><span class="badge">评分 ${row.score}</span></div>
          <div class="kv">
            <div><span>PE</span><b>${fmt(row.pe)}</b></div>
            <div><span>股息率</span><b>${pct(row.dividend_yield)}</b></div>
            <div><span>ROE</span><b>${pct(row.roe)}</b></div>
            <div><span>市值</span><b>${fmt(row.market_cap)}亿</b></div>
            <div><span>偏离MA120</span><b>${pct(row.deviation)}</b></div>
            <div><span>止盈</span><b>${fmt(row.take_profit_1)}</b></div>
          </div>
        </article>
      `).join("");
    }

    function exportCsv() {
      if (!state.stocks.length) return;
      const header = ["代码","名称","行业","价格","PE","股息率","ROE","市值","MA120偏离","评分","买入价","补仓价1","补仓价2","止盈价1","止盈价2"];
      const lines = state.stocks.map(row => [row.code,row.name,row.industry,row.price,row.pe,row.dividend_yield,row.roe,row.market_cap,row.deviation,row.score,row.buy_price,row.add_price_1,row.add_price_2,row.take_profit_1,row.take_profit_2]);
      const csv = "\ufeff" + [header, ...lines].map(line => line.map(v => `"${String(v ?? "").replace(/"/g, '""')}"`).join(",")).join("\n");
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([csv], { type: "text/csv;charset=utf-8" }));
      a.download = "点金术候选股.csv";
      a.click();
      URL.revokeObjectURL(a.href);
    }

    document.querySelectorAll(".tab").forEach(btn => btn.addEventListener("click", () => showTab(btn.dataset.tab)));
    $("refreshEtf").addEventListener("click", () => refreshEtf($("force").checked));
    $("refreshAll").addEventListener("click", () => refreshEtf(true));
    $("scanBtn").addEventListener("click", scanStocks);
    $("exportBtn").addEventListener("click", exportCsv);

    loadHealth().catch(() => {});
    refreshEtf(false);
  </script>
</body>
</html>
